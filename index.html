<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>Foco Essencial</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C8A44E;--accent-dim:#C8A44E22;--bg:#0A0A0A;--card:#111;--border:#1A1A1A;
  --text:#E8E4DC;--dim:#777;--urgent:#8B2500;--green:#2a5a2a;--green-bg:#061a10;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
input::placeholder,textarea::placeholder{color:#555}
button{font-family:var(--sans);cursor:pointer;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh}
.page{padding:20px 16px 40px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}
.fi{animation:fadeIn .5s ease-out both}
.fi1{animation-delay:.08s}.fi2{animation-delay:.16s}.fi3{animation-delay:.24s}
.fi4{animation-delay:.32s}.fi5{animation-delay:.4s}.fi6{animation-delay:.48s}
.breathe{animation:breathe 4s ease-in-out infinite}
.hidden{display:none!important}
.header{margin-bottom:20px}
.date-text{font-size:13px;color:var(--dim);letter-spacing:.5px;margin-bottom:4px}
.title-row{display:flex;justify-content:space-between;align-items:center}
.title{font-family:var(--serif);font-size:28px;font-weight:700;letter-spacing:-.5px}
.badge{background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.label{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:1.5px;margin-bottom:4px}
.dim{font-size:13px;color:var(--dim);line-height:1.5}
.alert-banner{border-radius:10px;padding:14px;font-size:13px;text-align:center;line-height:1.5;margin-bottom:12px}
.alert-green{background:var(--green-bg);border:1px solid var(--green);color:#B0E8C4;font-family:var(--serif);font-weight:600}
.alert-red{background:#1a0a06;border:1px solid var(--urgent);color:#E8C4B0;font-family:var(--serif);font-style:italic}
.alert-gold{background:#1a1508;border:1px solid #5a4a1a;color:var(--accent);font-weight:500}
.phase-row{display:flex;align-items:center;gap:14px}
.phase-icon{font-size:30px}
.phase-name{font-family:var(--serif);font-size:20px;font-weight:700}
.prog-bar{height:4px;background:#1A1A1A;border-radius:2px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#D4AF37);border-radius:2px;transition:width .6s}
.prog-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--dim)}
.sleep-card{text-align:center;transition:all .3s}
.sleep-card.urgent{border-color:var(--urgent);background:#1a0a06}
.sleep-time{font-family:var(--serif);font-size:44px;font-weight:700;line-height:1;margin:6px 0}
.btn-gold{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600}
.confirmed{color:var(--accent);font-weight:600;font-size:14px;margin-top:8px}
.study-card{text-align:center}
.study-subject{font-family:var(--serif);font-size:24px;font-weight:700;margin:4px 0}
.study-detail{font-size:12px;color:var(--dim);line-height:1.5}
.routine-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.routine-time{color:var(--accent);font-weight:600;min-width:50px;font-size:12px}
.routine-text{color:var(--text);line-height:1.4}
.routine-text.dimmed{color:var(--dim)}
.pri-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pri-num{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pri-text{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;min-height:40px}
.pri-empty{color:#444;font-style:italic}
.pri-edit{flex:1;display:flex;gap:6px}
.pri-input{flex:1;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);outline:none;font-family:var(--sans)}
.pri-save{background:var(--accent);color:var(--bg);border:none;border-radius:8px;width:36px;font-size:15px;font-weight:700}
.clear-btn{background:none;border:none;color:var(--dim);font-size:18px;padding:0 4px}
.refl-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.refl-toggle{color:var(--accent);font-size:20px;font-weight:300}
.refl-quote{font-family:var(--serif);font-size:17px;font-style:italic;line-height:1.5;margin-top:12px;margin-bottom:6px}
.refl-author{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:8px}
.refl-context{font-size:13px;color:var(--dim);line-height:1.5;border-top:1px solid var(--border);padding-top:8px}
.nav-row{display:flex;gap:8px;margin-bottom:12px}
.nav-btn{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;font-size:13px;font-weight:500;color:var(--text);text-align:center}
.back-btn{background:none;border:none;color:var(--accent);font-size:14px;margin-bottom:16px;padding:0}
.reset-btn{background:none;border:none;color:#333;font-size:11px;display:block;margin:20px auto 0;padding:8px}
.scr-title{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:6px}
.scr-sub{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:16px}
.log-ta{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:14px;color:var(--text);resize:vertical;outline:none;font-family:var(--sans);line-height:1.6;margin-bottom:10px}
.submit-btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;margin-bottom:20px}
.submit-btn:disabled{opacity:.4;cursor:default}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px}
.log-meta{font-size:11px;color:var(--dim);margin-bottom:3px}
.log-text{font-size:13px;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-num{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--dim);letter-spacing:.5px}
.tl-item{display:flex;align-items:center;gap:10px;padding:12px;border-left:2px solid #222;margin-left:14px}
.tl-item.active{border-left-color:var(--accent);background:var(--accent-dim);border-radius:0 8px 8px 0}
.tl-item.done{border-left-color:var(--green);opacity:.7}
.tl-icon{font-size:20px}.tl-name{font-size:14px;font-weight:600}.tl-desc{font-size:11px;color:var(--dim)}
.tl-badge{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:1px}
.sl-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--dim)}
.countdown-card{text-align:center}
.countdown-num{font-family:var(--serif);font-size:52px;font-weight:700;color:var(--accent);line-height:1}
.countdown-label{font-size:12px;color:var(--dim);margin-top:2px}

/* Notification banner */
.notif-banner{background:#1a1508;border:1px solid #3a3010;border-radius:10px;padding:14px;margin-bottom:12px;text-align:center}
.notif-banner button{margin-top:8px}
.notif-status{font-size:11px;color:var(--dim);text-align:center;margin-bottom:8px}
</style>
</head>
<body>
<div class="app" id="app">

<!-- HOME -->
<div id="s-home" class="page">
  <div class="header fi">
    <div class="date-text" id="date-text"></div>
    <div class="title-row">
      <h1 class="title">Foco Essencial</h1>
      <div class="badge" id="day-badge"></div>
    </div>
  </div>

  <!-- Notification permission -->
  <div id="notif-ask" class="notif-banner fi hidden">
    <div style="font-size:13px;color:var(--accent);margin-bottom:4px;font-weight:600">Ativar notificações</div>
    <div class="dim">Para receber lembretes de sono, estudo e prioridades.</div>
    <button class="btn-gold" onclick="requestNotifPermission()" style="margin-top:10px">Ativar</button>
  </div>
  <div id="notif-status" class="notif-status hidden"></div>

  <div id="morning-banner" class="alert-banner alert-green fi hidden"></div>
  <div id="register-banner" class="alert-banner alert-gold fi hidden"></div>

  <div class="card fi fi1" id="countdown-card">
    <div class="countdown-card">
      <div class="label">ENCEJA 2026</div>
      <div class="countdown-num" id="countdown-num"></div>
      <div class="countdown-label" id="countdown-label"></div>
    </div>
  </div>

  <div class="card fi fi1" id="phase-card">
    <div class="phase-row">
      <div class="phase-icon" id="phase-icon"></div>
      <div><div class="label" id="phase-label"></div><div class="phase-name" id="phase-name"></div><div class="dim" id="phase-desc"></div></div>
    </div>
  </div>

  <div class="fi fi2" style="margin-bottom:12px">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-stats"><span id="nights-ct"></span><span style="color:var(--accent);font-weight:600" id="streak-ct"></span></div>
  </div>

  <div class="card fi fi2" id="study-card">
    <div class="study-card">
      <div class="label" id="study-label">ESTUDO DE HOJE</div>
      <div class="study-subject" id="study-subject"></div>
      <div class="study-detail" id="study-detail"></div>
    </div>
  </div>

  <div class="card fi fi3 breathe" id="sleep-card">
    <div class="sleep-card">
      <div class="label" id="sleep-lbl">META DE SONO</div>
      <div class="sleep-time" id="sleep-time"></div>
      <div class="dim" id="sleep-sub"></div>
      <div id="sleep-action"></div>
    </div>
  </div>

  <div class="card fi fi3" id="routine-card">
    <div class="refl-header" onclick="toggleRoutine()">
      <span class="label">ROTINA DO DIA</span>
      <span class="refl-toggle" id="routine-toggle">+</span>
    </div>
    <div id="routine-body" class="hidden" style="margin-top:10px"></div>
  </div>

  <div class="fi fi4" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="label">3 PRIORIDADES PARETO</span>
      <span class="dim" style="font-size:11px">amanhã</span>
    </div>
    <div id="pri-container"></div>
  </div>

  <div class="card fi fi5" id="refl-card">
    <div class="refl-header" onclick="toggleReflection()">
      <span class="label">DOSE DE REFLEXÃO</span>
      <span class="refl-toggle" id="refl-toggle">+</span>
    </div>
    <div id="refl-body" class="hidden"></div>
  </div>

  <div class="nav-row fi fi6">
    <button class="nav-btn" onclick="go('log')">📝 Log</button>
    <button class="nav-btn" onclick="go('stats')">📊 Relatório</button>
    <button class="nav-btn" onclick="go('plan')">📋 Plano</button>
  </div>

  <div id="shutdown-banner" class="alert-banner alert-red fi hidden"></div>
  <button class="reset-btn" onclick="resetApp()">Reiniciar jornada</button>
</div>

<!-- LOG -->
<div id="s-log" class="page hidden">
  <button class="back-btn" onclick="go('home')">← Voltar</button>
  <h2 class="scr-title">Log de Decisões</h2>
  <p class="scr-sub" id="log-prompt"></p>
  <textarea class="log-ta" id="log-ta" placeholder="O que impediu? Seja honesto consigo mesmo..." rows="5"></textarea>
  <button class="submit-btn" id="log-btn" onclick="submitLog()" disabled>Registrar</button>
  <div id="log-list"></div>
</div>

<!-- STATS -->
<div id="s-stats" class="page hidden">
  <button class="back-btn" onclick="go('home')">← Voltar</button>
  <h2 class="scr-title">Sua Jornada</h2>
  <div id="stats-grid" class="stats-grid"></div>
  <div id="timeline"></div>
  <div id="sleep-hist" style="margin-top:16px"></div>
</div>

<!-- PLAN -->
<div id="s-plan" class="page hidden">
  <button class="back-btn" onclick="go('home')">← Voltar</button>
  <h2 class="scr-title">Plano 90 Dias</h2>
  <p class="scr-sub">De 18 de abril a 17 de julho. Prova: 23 de agosto.</p>
  <div id="plan-content"></div>
</div>

</div>

<script>
/* ═══════ REFLECTIONS ═══════ */
const R=[
{a:"Camus",t:"A única questão filosófica verdadeiramente séria é o suicídio. Julgar se a vida vale ou não a pena ser vivida é responder à questão fundamental da filosofia.",c:"Escolha viver com intensidade hoje."},
{a:"Sartre",t:"Estamos condenados a ser livres.",c:"Cada minuto desperdiçado foi uma escolha sua."},
{a:"Camus",t:"No meio do inverno, descobri enfim que havia em mim um verão invencível.",c:"O cansaço é temporário. O que você constrói, fica."},
{a:"Sêneca",t:"Não é que temos pouco tempo, mas que desperdiçamos muito.",c:"Quanto do seu dia foi escolha e quanto foi inércia?"},
{a:"Epicteto",t:"Não são as coisas que nos perturbam, mas o julgamento que fazemos delas.",c:"A culpa não te move. A decisão, sim."},
{a:"Sartre",t:"O homem está condenado a ser livre; porque uma vez lançado ao mundo, ele é responsável por tudo o que faz.",c:"Procrastinar também é uma decisão. Assuma-a ou mude-a."},
{a:"Nietzsche",t:"Quem tem um porquê para viver pode suportar quase qualquer como.",c:"Lembre-se por que você começou."},
{a:"Camus",t:"É preciso imaginar Sísifo feliz.",c:"A rotina pode ser sua prisão ou seu ritual. Você escolhe."},
{a:"Marco Aurélio",t:"Ao amanhecer, diga a si mesmo: vou encontrar pessoas intrusivas, ingratas, arrogantes. Mas não posso me irritar, pois somos feitos para cooperar.",c:"O dia será difícil. Aceite e aja mesmo assim."},
{a:"Kierkegaard",t:"A vida só pode ser compreendida olhando para trás; mas só pode ser vivida olhando para frente.",c:"O ENCEJA é para frente."},
{a:"Heráclito",t:"Nenhum homem pode banhar-se no mesmo rio duas vezes, pois nem o homem nem o rio são os mesmos.",c:"Hoje você é outro. Prove."},
{a:"Sêneca",t:"A vida é longa o suficiente se for bem empregada.",c:"40 minutos de estudo focado valem mais que 3 horas de culpa."},
{a:"Dostoiévski",t:"O segredo da existência humana reside não apenas em viver, mas em saber para que se vive.",c:"Você sabe por que quer o ENCEJA. Não perca isso de vista."},
{a:"Camus",t:"Sempre haverá uma hora do dia ou da noite em que é preciso ter coragem para chamar as coisas pelo nome.",c:"O LoL às 2h da manhã não é descanso. É fuga. Nomeie."},
{a:"Epiteto",t:"Primeiro diga a si mesmo o que você seria; e então faça o que precisa fazer.",c:"Quem você quer ser dorme às 23h."},
{a:"Sartre",t:"A existência precede a essência.",c:"Você não nasce produtivo. Você se torna, uma noite de sono por vez."},
{a:"Sêneca",t:"Enquanto adiamos, a vida passa.",c:"Hoje é o dia 1. Não o amanhã."},
{a:"Marco Aurélio",t:"A melhor vingança é não ser como seu inimigo.",c:"Seu inimigo é o Joabe de ontem. Seja diferente hoje."},
{a:"Camus",t:"O absurdo não liberta; ele prende.",c:"Reconhecer o ciclo não basta. É preciso quebrá-lo."},
{a:"Nietzsche",t:"Aquele que tem um porquê suporta qualquer como.",c:"O desconforto de dormir cedo é menor que o peso de mais um dia perdido."},
{a:"Thoreau",t:"A maioria dos homens vive uma vida de desespero silencioso.",c:"Você não precisa ser a maioria."},
{a:"Sócrates",t:"Uma vida não examinada não vale a pena ser vivida.",c:"O log de decisões é seu exame diário. Use-o."},
{a:"Montaigne",t:"Meu ofício e minha arte é viver.",c:"Viver bem exige prática. O descanso é parte do ofício."},
{a:"Simone de Beauvoir",t:"É no conhecimento das condições autênticas de nossa vida que devemos encontrar força para viver e razões para agir.",c:"Sem ilusões, sem culpa. Só clareza."},
{a:"Aristóteles",t:"Somos o que repetidamente fazemos. A excelência, portanto, não é um ato, mas um hábito.",c:"Não precisa ser perfeito. Precisa ser consistente."},
{a:"Pascal",t:"Toda a infelicidade dos homens advém de uma só coisa: não saber ficar quieto num quarto.",c:"Às 22h30, o quarto silencioso é seu aliado."},
{a:"Kierkegaard",t:"A ansiedade é a vertigem da liberdade.",c:"A ansiedade é sinal de que você está livre. Use isso."},
{a:"Epicuro",t:"Não é o que temos, mas o que apreciamos, que constitui nossa abundância.",c:"Cada noite dormida no horário é uma conquista."},
{a:"Heidegger",t:"O homem age como se fosse o modelador e o mestre da linguagem, quando na verdade é a linguagem que permanece mestra do homem.",c:"'Não consigo' vira 'ainda não fiz'."},
{a:"Camus",t:"Não caminhe atrás de mim; talvez eu não saiba liderar. Caminhe ao meu lado e seja meu amigo.",c:"Este app não é seu mestre. É seu espelho."},
];

const CONFRONTATIONS = [
  "O que exatamente você está escolhendo no lugar desta tarefa?",
  "Sartre diria: você está fugindo da sua liberdade agora.",
  "A procrastinação é uma decisão. Você está decidindo não agir.",
  "Daqui a uma hora, o que você vai sentir sobre este momento?",
  "Você está evitando a tarefa ou evitando o desconforto de começar?",
  "Camus empurrou a pedra mesmo sabendo que ela cairia. E você?",
];

/* ═══════ CONFIG ═══════ */
const PHASES=[{p:1,name:"Alicerce",days:[1,10],desc:"Reconquistar o sono",icon:"🌙"},{p:2,name:"Reconexão",days:[11,20],desc:"10 min leitura + inscrição ENCEJA",icon:"📖"},{p:3,name:"Construção",days:[21,90],desc:"40 min estudo ENCEJA",icon:"🔥"}];
const SLEEPS=[{days:[1,3],label:"00h00"},{days:[4,7],label:"23h30"},{days:[8,90],label:"23h00"}];
const STUDY=[{d:0,s:"Descanso",dt:"Revisão leve ou descanso total.",i:"🧘"},{d:1,s:"Matemática",dt:"Operações, frações, porcentagem, geometria, gráficos.",i:"🔢"},{d:2,s:"Linguagens + Redação",dt:"Interpretação, gramática. 1 redação/semana.",i:"✍️"},{d:3,s:"Ciências da Natureza",dt:"Bio, Química, Física do dia a dia.",i:"🔬"},{d:4,s:"Ciências Humanas",dt:"História, Geografia, Filosofia, Sociologia.",i:"🏛️"},{d:5,s:"Matemática",dt:"Reforço: equações, regra de três, estatística.",i:"📐"},{d:6,s:"Redação + Revisão",dt:"1 redação + revise os erros da semana.",i:"📝"}];
const EXAM=new Date(2026,7,23);
const KEY="foco-essencial-v3";

/* ═══════ NOTIFICATION SCHEDULE ═══════ */
const NOTIF_SCHEDULE = [
  {h:6,m:0,title:"🌅 Hora de levantar",body:"Pé no chão. A primeira vitória do dia é sair da cama.",tag:"morning",phase:3},
  {h:6,m:5,title:"📖 Hora de estudar",body:"40 minutos. Só isso. Abra o material e comece.",tag:"study",phase:3},
  {h:6,m:30,title:"📖 Leitura matinal",body:"10 minutos de leitura. Reconecte o foco.",tag:"reading",phase:2},
  {h:12,m:0,title:"🎯 Lembrete Pareto",body:"Quais são suas 3 prioridades hoje? Está no caminho?",tag:"pareto",phase:1},
  {h:18,m:30,title:"🏠 Chegou em casa",body:"Descanse, mas lembre: às 22h é hora de planejar.",tag:"evening",phase:1},
  {h:22,m:0,title:"📋 Ritual noturno",body:"Abra o Foco Essencial. Defina as 3 prioridades de amanhã.",tag:"plan",phase:1},
  {h:22,m:30,title:"📵 Celular no carregador",body:"Sem telas a partir de agora. Longe da cama.",tag:"shutdown",phase:1},
  {h:23,m:0,title:"😴 Hora de dormir",body:"Cada hora que você rouba do sono, rouba de si mesmo amanhã.",tag:"sleep",phase:1,urgent:true},
];

/* ═══════ STATE ═══════ */
let D=load()||{startDate:tod(),log:[],priorities:["","",""],sleepLog:[],notifiedToday:{}};
let editPri=-1, reflOpen=false, routineOpen=false;
let swReady=null;

/* ═══════ UTILS ═══════ */
function tod(){return new Date().toISOString().split("T")[0]}
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null}catch(e){return null}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(D))}catch(e){}}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function daysFrom(ds){const s=new Date(ds);s.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.floor((t-s)/864e5)+1}
function daysUntilExam(){const t=new Date();t.setHours(0,0,0,0);return Math.floor((EXAM-t)/864e5)}
function getPhase(d){for(const p of PHASES)if(d>=p.days[0]&&d<=p.days[1])return p;return PHASES[2]}
function getSleep(d){for(const s of SLEEPS)if(d>=s.days[0]&&d<=s.days[1])return s;return SLEEPS[SLEEPS.length-1]}
function getStudy(){return STUDY[new Date().getDay()]}
function formatDate(){const d=new Date(),ds=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"],ms=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];return`${ds[d.getDay()]}, ${d.getDate()} de ${ms[d.getMonth()]}`}
function timeNow(){return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}

/* ═══════ NOTIFICATIONS ═══════ */
function registerSW(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      swReady=reg;
      console.log('SW registered');
    }).catch(e=>console.log('SW failed',e));
  }
}

function requestNotifPermission(){
  if(!('Notification' in window)){alert('Seu navegador não suporta notificações.');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      document.getElementById('notif-ask').classList.add('hidden');
      showNotifStatus('✓ Notificações ativadas');
    } else {
      showNotifStatus('Notificações bloqueadas. Ative nas configurações do Chrome.');
    }
  });
}

function showNotifStatus(msg){
  const el=document.getElementById('notif-status');
  el.textContent=msg;
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'),5000);
}

function sendNotification(title, body, tag, urgent){
  if(Notification.permission!=='granted')return;
  if(swReady&&swReady.active){
    swReady.active.postMessage({type:'SHOW_NOTIFICATION',title,body,tag,urgent});
  } else {
    new Notification(title,{body,tag,vibrate:[200,100,200]});
  }
}

function checkNotifications(){
  const now=new Date();
  const h=now.getHours(), m=now.getMinutes();
  const today=tod();
  const cd=Math.min(daysFrom(D.startDate),90);
  const phase=getPhase(cd);

  // Reset daily tracker
  if(!D.notifiedToday||D.notifiedToday._date!==today){
    D.notifiedToday={_date:today};
    save();
  }

  NOTIF_SCHEDULE.forEach(n=>{
    // Only show if current phase >= notification's minimum phase
    if(phase.p<n.phase)return;
    // Phase 2 specific: only show reading, not study
    if(n.tag==='study'&&phase.p<3)return;
    if(n.tag==='reading'&&phase.p!==2)return;

    if(h===n.h&&m===n.m&&!D.notifiedToday[n.tag]){
      D.notifiedToday[n.tag]=true;
      save();
      sendNotification(n.title,n.body,n.tag,n.urgent||false);
    }
  });
}

// Check every 30 seconds
setInterval(checkNotifications,30000);

/* ═══════ SCREENS ═══════ */
function go(s){
  ["home","log","stats","plan"].forEach(n=>document.getElementById("s-"+n).classList.toggle("hidden",n!==s));
  if(s==="home")renderHome();
  if(s==="log")renderLog();
  if(s==="stats")renderStats();
  if(s==="plan")renderPlan();
  window.scrollTo(0,0);
}

/* ═══════ HOME ═══════ */
function renderHome(){
  const now=new Date(),h=now.getHours();
  const cd=Math.min(daysFrom(D.startDate),90);
  const phase=getPhase(cd),sleep=getSleep(cd),study=getStudy();
  const ref=R[cd%R.length];
  const isShut=h>=22,isMorn=h>=5&&h<8;
  const dte=daysUntilExam();

  // Notification permission
  if('Notification' in window&&Notification.permission==='default'){
    document.getElementById('notif-ask').classList.remove('hidden');
  } else {
    document.getElementById('notif-ask').classList.add('hidden');
  }

  document.getElementById("date-text").textContent=formatDate();
  document.getElementById("day-badge").textContent=`Dia ${cd}/90`;
  document.getElementById("countdown-num").textContent=dte;
  document.getElementById("countdown-label").textContent="dias até a prova (23 de agosto)";

  const mb=document.getElementById("morning-banner");
  if(isMorn){mb.classList.remove("hidden");mb.textContent="Pé no chão. Sem negociação. A primeira vitória do dia é levantar.";}else mb.classList.add("hidden");

  const rb=document.getElementById("register-banner");
  const td=new Date(),rs=new Date(2026,4,4),re=new Date(2026,4,15);
  if(td>=rs&&td<=re){rb.classList.remove("hidden");rb.textContent="⚠️ INSCRIÇÃO ENCEJA ABERTA! 4 a 15 de maio.";}
  else if(td<rs){rb.classList.remove("hidden");rb.textContent=`Inscrição ENCEJA abre em ${Math.ceil((rs-td)/864e5)} dias (4 de maio).`;}
  else rb.classList.add("hidden");

  document.getElementById("phase-icon").textContent=phase.icon;
  document.getElementById("phase-label").textContent=`FASE ${phase.p}`;
  document.getElementById("phase-name").textContent=phase.name;
  document.getElementById("phase-desc").textContent=phase.desc;

  const comp=(D.sleepLog||[]).filter(s=>s.confirmed).length;
  let streak=0;const sorted=[...(D.sleepLog||[])].sort((a,b)=>b.date.localeCompare(a.date));
  for(const l of sorted){if(l.confirmed)streak++;else break;}
  document.getElementById("prog-fill").style.width=`${Math.min((cd/90)*100,100)}%`;
  document.getElementById("nights-ct").textContent=`${comp} noites`;
  document.getElementById("streak-ct").textContent=streak>1?`${streak} seguidas`:"";

  const sc=document.getElementById("study-card");
  if(cd>=21){sc.classList.remove("hidden");document.getElementById("study-label").textContent="ESTUDO DE HOJE — 40 MIN";document.getElementById("study-subject").textContent=`${study.i} ${study.s}`;document.getElementById("study-detail").textContent=study.dt;}
  else if(cd>=11){sc.classList.remove("hidden");document.getElementById("study-label").textContent="LEITURA — 10 MIN";document.getElementById("study-subject").textContent="📖 Leitura livre";document.getElementById("study-detail").textContent="Qualquer livro. Reconecte o hábito de focar.";}
  else{sc.classList.remove("hidden");document.getElementById("study-label").textContent="FOCO DESTA FASE";document.getElementById("study-subject").textContent="😴 Apenas sono";document.getElementById("study-detail").textContent="Não adicione nada. Só conserte o sono.";}

  const slC=document.getElementById("sleep-card");slC.classList.toggle("urgent",isShut);
  document.getElementById("sleep-lbl").textContent=isShut?"⚠️ HORA DE DESLIGAR":"META DE SONO";
  document.getElementById("sleep-time").textContent=sleep.label;
  document.getElementById("sleep-sub").textContent=isShut?"Sem LoL. Celular longe da cama.":"LoL: última partida até 22h00";
  const tsl=(D.sleepLog||[]).find(s=>s.date===tod());
  document.getElementById("sleep-action").innerHTML=tsl?'<div class="confirmed">✓ Compromisso firmado</div>':'<button class="btn-gold" onclick="confirmSleep()" style="margin-top:10px">Vou cumprir hoje</button>';

  renderRoutine(cd,h);
  renderPriorities();

  document.getElementById("refl-body").innerHTML=`<div class="refl-quote">"${ref.t}"</div><div class="refl-author">— ${ref.a}</div><div class="refl-context">${ref.c}</div>`;
  document.getElementById("refl-body").classList.toggle("hidden",!reflOpen);
  document.getElementById("refl-toggle").textContent=reflOpen?"−":"+";

  const sb=document.getElementById("shutdown-banner");
  if(isShut){sb.classList.remove("hidden");sb.textContent='"Joabe, cada hora que você rouba do sono, está roubando de si mesmo amanhã."';}else sb.classList.add("hidden");
}

function renderRoutine(cd,h){
  const rt=[];
  if(cd>=21){
    rt.push({t:"06:00",x:"Acordar — lavar rosto, água",hi:h>=5&&h<7});
    rt.push({t:"06:10",x:"Estudo ENCEJA — 40 min focados",hi:h>=6&&h<7});
    rt.push({t:"06:50",x:"Café, preparar saída",hi:h>=6&&h<8});
  } else if(cd>=11){
    rt.push({t:"06:30",x:"Acordar — lavar rosto, água",hi:h>=5&&h<7});
    rt.push({t:"06:40",x:"Leitura — 10 min com café",hi:h>=6&&h<7});
    rt.push({t:"06:50",x:"Preparar saída",hi:h>=6&&h<8});
  } else {
    rt.push({t:"06:30",x:"Acordar — sem negociação",hi:h>=5&&h<7});
    rt.push({t:"06:40",x:"Preparar saída com calma",hi:h>=6&&h<8});
  }
  rt.push({t:"07:00",x:"Sair de casa",hi:h>=7&&h<8});
  rt.push({t:"08-18",x:"Trabalho — sapataria",hi:h>=8&&h<18});
  rt.push({t:"19:00",x:"Chegar, jantar, descanso",hi:h>=19&&h<22});
  rt.push({t:"22:00",x:"Abrir Foco Essencial — planejar amanhã",hi:h>=22&&h<23});
  rt.push({t:"22:30",x:"Celular no carregador, sem telas",hi:h>=22});
  rt.push({t:"23:00",x:"Dormir",hi:h>=23||h<5});
  document.getElementById("routine-body").innerHTML=rt.map(r=>`<div class="routine-item"><div class="routine-time">${r.t}</div><div class="routine-text ${r.hi?'':'dimmed'}">${r.x}</div></div>`).join("");
}

function renderPriorities(){
  const c=document.getElementById("pri-container");c.innerHTML="";
  D.priorities.forEach((p,i)=>{
    const row=document.createElement("div");row.className="pri-row";
    if(editPri===i){
      row.innerHTML=`<div class="pri-num">${i+1}</div><div class="pri-edit"><input class="pri-input" id="pi-${i}" value="${esc(p)}" placeholder="O que é essencial?"><button class="pri-save" onclick="savePri(${i})">✓</button></div>`;
      c.appendChild(row);
      setTimeout(()=>{const inp=document.getElementById("pi-"+i);if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==="Enter")savePri(i)};}},50);
    } else {
      const has=p.trim().length>0;
      row.innerHTML=`<div class="pri-num">${i+1}</div><div class="pri-text ${has?'':'pri-empty'}" onclick="editPri=${i};renderPriorities()">${has?esc(p):"Toque para definir"}${has?`<button class="clear-btn" onclick="event.stopPropagation();D.priorities[${i}]='';save();renderPriorities()">×</button>`:""}</div>`;
      c.appendChild(row);
    }
  });
}

/* ═══════ ACTIONS ═══════ */
function confirmSleep(){
  if(!(D.sleepLog||[]).find(s=>s.date===tod())){
    D.sleepLog=[...(D.sleepLog||[]),{date:tod(),confirmed:true,target:getSleep(Math.min(daysFrom(D.startDate),90)).label}];save();
  }
  renderHome();
}
function savePri(i){const inp=document.getElementById("pi-"+i);if(inp&&inp.value.trim())D.priorities[i]=inp.value.trim();editPri=-1;save();renderPriorities();}
function toggleReflection(){reflOpen=!reflOpen;document.getElementById("refl-body").classList.toggle("hidden",!reflOpen);document.getElementById("refl-toggle").textContent=reflOpen?"−":"+";}
function toggleRoutine(){routineOpen=!routineOpen;document.getElementById("routine-body").classList.toggle("hidden",!routineOpen);document.getElementById("routine-toggle").textContent=routineOpen?"−":"+";}

/* ═══════ LOG ═══════ */
function renderLog(){
  const cd=Math.min(daysFrom(D.startDate),90);
  document.getElementById("log-prompt").textContent=cd<=10?"Você procrastinou algo hoje? O que impediu?":"Qual medo impediu essa ação hoje?";
  const ta=document.getElementById("log-ta");ta.value="";
  const btn=document.getElementById("log-btn");btn.disabled=true;
  ta.oninput=()=>{btn.disabled=!ta.value.trim()};
  const entries=D.log||[];
  if(!entries.length){document.getElementById("log-list").innerHTML="";return;}
  document.getElementById("log-list").innerHTML='<div class="label" style="margin-bottom:10px">REGISTROS</div>'+[...entries].reverse().slice(0,10).map(e=>`<div class="log-item"><div class="log-meta">Dia ${e.day} · ${e.time}</div><div class="log-text">${esc(e.text)}</div></div>`).join("");
}
function submitLog(){
  const ta=document.getElementById("log-ta");if(!ta.value.trim())return;
  D.log=[...(D.log||[]),{date:tod(),day:Math.min(daysFrom(D.startDate),90),text:ta.value.trim(),time:timeNow()}];
  save();go("home");
}

/* ═══════ STATS ═══════ */
function renderStats(){
  const cd=Math.min(daysFrom(D.startDate),90),phase=getPhase(cd);
  const comp=(D.sleepLog||[]).filter(s=>s.confirmed).length;
  let streak=0;const sorted=[...(D.sleepLog||[])].sort((a,b)=>b.date.localeCompare(a.date));
  for(const l of sorted){if(l.confirmed)streak++;else break;}
  document.getElementById("stats-grid").innerHTML=[{n:cd,l:"Dia atual"},{n:comp,l:"Noites cumpridas"},{n:streak,l:"Sequência"},{n:(D.log||[]).length,l:"Logs escritos"}].map(s=>`<div class="stat-card"><div class="stat-num">${s.n}</div><div class="stat-lbl">${s.l}</div></div>`).join("");
  document.getElementById("timeline").innerHTML=PHASES.map(p=>{const cls=p.p===phase.p?"active":p.p<phase.p?"done":"";const badge=p.p<phase.p?'<span class="tl-badge" style="color:var(--green)">✓</span>':p.p===phase.p?'<span class="tl-badge" style="color:var(--accent)">AGORA</span>':"";return`<div class="tl-item ${cls}"><div class="tl-icon">${p.icon}</div><div><div class="tl-name">${p.name}</div><div class="tl-desc">Dias ${p.days[0]}-${p.days[1]}</div></div>${badge}</div>`;}).join("");
  const sl=D.sleepLog||[];
  document.getElementById("sleep-hist").innerHTML=sl.length?'<div class="label" style="margin-bottom:8px">NOITES</div>'+[...sl].reverse().slice(0,14).map(s=>`<div class="sl-item"><span>${s.date}</span><span style="color:var(--text)">Meta: ${s.target}</span><span style="color:var(--accent);font-weight:700">✓</span></div>`).join(""):"";
}

/* ═══════ PLAN ═══════ */
function renderPlan(){
  const phases=[
    {title:"FASE 1 — ALICERCE (Dias 1-10)",icon:"🌙",color:"var(--accent)",items:["Único objetivo: dormir até 23h-00h","Sem adição de estudo ou leitura","LoL: última partida até 22h","22:30: celular longe da cama","Usar Foco Essencial toda noite","Zero culpa nos dias que falhar"]},
    {title:"FASE 2 — RECONEXÃO (Dias 11-20)",icon:"📖",color:"#B0E8C4",items:["Manter sono estabilizado","Adicionar 10 min de leitura pela manhã","Qualquer livro — reconectar o foco","INSCRIÇÃO ENCEJA: 4 a 15 de maio","Log de Decisões diário"]},
    {title:"FASE 3 — CONSTRUÇÃO (Dias 21-90)",icon:"🔥",color:"#E8C4B0",items:["Acordar 6h. Estudar 40 min","Seg: Matemática","Ter: Linguagens + Redação","Qua: Ciências da Natureza","Qui: Ciências Humanas","Sex: Matemática (reforço)","Sáb: Redação + Revisão","Dom: Descanso ou revisão leve","1 redação por semana, mínimo","Use provas anteriores do ENCEJA"]},
  ];
  document.getElementById("plan-content").innerHTML=phases.map(p=>`<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:24px">${p.icon}</span><span style="font-family:var(--serif);font-size:18px;font-weight:700;color:${p.color}">${p.title}</span></div>${p.items.map(item=>`<div style="font-size:13px;color:var(--dim);padding:6px 0;border-bottom:1px solid var(--border);line-height:1.5">${item}</div>`).join("")}</div>`).join("")+`<div class="card" style="text-align:center"><div class="label">REGRAS INEGOCIÁVEIS</div><div style="font-size:13px;color:var(--dim);line-height:1.8;margin-top:8px">Nenhuma tela depois das 22h30<br>Sem culpa nos dias que falhar<br>Zero mudanças simultâneas<br>Só o sono importa na Fase 1<br>O ENCEJA é o 20% que muda os 80%</div></div><div class="card"><div class="label">NOTIFICAÇÕES ATIVAS</div><div style="font-size:13px;color:var(--dim);line-height:1.8;margin-top:8px">06:00 — Hora de levantar<br>06:05 — Hora de estudar (Fase 3)<br>12:00 — Lembrete das prioridades<br>18:30 — Chegou em casa<br>22:00 — Ritual noturno<br>22:30 — Celular no carregador<br>23:00 — Hora de dormir</div></div>`;
}

/* ═══════ RESET ═══════ */
function resetApp(){if(!confirm("Tem certeza? Apaga todos os dados."))return;D={startDate:tod(),log:[],priorities:["","",""],sleepLog:[],notifiedToday:{}};save();editPri=-1;reflOpen=false;routineOpen=false;go("home");}

/* ═══════ INIT ═══════ */
registerSW();
renderHome();
checkNotifications();
</script>
